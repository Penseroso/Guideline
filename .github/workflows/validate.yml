name: Validate structured data

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Validate pilot structured data
        run: npm run validate:pilots

      - name: Validate derived contract
        run: npm run validate:derived

      - name: Validate legacy derived artifacts
        run: npm run validate:legacy

      - name: Validate derived registry
        run: npm run validate:registry
